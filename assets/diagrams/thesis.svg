<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
<defs>
  <style>
    .m{font-family:'JetBrains Mono','Courier New',monospace}
    .s{font-family:-apple-system,'Segoe UI','Helvetica Neue',sans-serif}
    @keyframes pulseBefore{0%,100%{opacity:.55}50%{opacity:.85}}
    @keyframes pulseAfter{0%,100%{opacity:.9}50%{opacity:1}}
    @keyframes drift{0%{transform:translate(0,0)}50%{transform:translate(1px,2px)}100%{transform:translate(0,0)}}
    @keyframes fade1{0%,15%{opacity:0}40%,100%{opacity:1}}
    @keyframes fade2{0%,30%{opacity:0}55%,100%{opacity:1}}
    @keyframes fade3{0%,45%{opacity:0}70%,100%{opacity:1}}
    @keyframes fade4{0%,60%{opacity:0}85%,100%{opacity:1}}
    .f1{animation:fade1 3.5s ease-out both}
    .f2{animation:fade2 3.5s ease-out both}
    .f3{animation:fade3 3.5s ease-out both}
    .f4{animation:fade4 3.5s ease-out both}
    .before-dot{animation:pulseBefore 4s ease-in-out infinite, drift 6s ease-in-out infinite}
    .after-line{animation:pulseAfter 3s ease-in-out infinite}
  </style>

  <!-- ── Bloom filter — multi-layer Gaussian for line glow ── -->
  <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2.5" result="b1"/>
    <feGaussianBlur stdDeviation="6" result="b2"/>
    <feGaussianBlur stdDeviation="14" result="b3"/>
    <feMerge>
      <feMergeNode in="b3"/>
      <feMergeNode in="b2"/>
      <feMergeNode in="b1"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- ── Soft bloom — for text and subtle glows ── -->
  <filter id="softbloom" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="1.5" result="b1"/>
    <feGaussianBlur stdDeviation="4" result="b2"/>
    <feMerge>
      <feMergeNode in="b2"/>
      <feMergeNode in="b1"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <!-- ── Background noise / dot field ── -->
  <pattern id="dots" width="42" height="42" patternUnits="userSpaceOnUse">
    <circle cx="21" cy="21" r="0.8" fill="#0b1020"/>
  </pattern>

  <!-- ── Bright gradient stroke for the transformation arrow ── -->
  <linearGradient id="transform-grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#4d6280" stop-opacity="0.4"/>
    <stop offset="50%" stop-color="#45B7D1" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#FF1493" stop-opacity="0.95"/>
  </linearGradient>

  <!-- ── Helix strand gradients per sibling ── -->
  <linearGradient id="strand-eva" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#FF1493" stop-opacity="0.2"/>
    <stop offset="50%" stop-color="#FF1493" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#FF1493" stop-opacity="0.2"/>
  </linearGradient>
  <linearGradient id="strand-corso" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#00BFFF" stop-opacity="0.2"/>
    <stop offset="50%" stop-color="#00BFFF" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#00BFFF" stop-opacity="0.2"/>
  </linearGradient>
  <linearGradient id="strand-soul" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#34D399" stop-opacity="0.2"/>
    <stop offset="50%" stop-color="#34D399" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#34D399" stop-opacity="0.2"/>
  </linearGradient>
  <linearGradient id="strand-ayin" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#FF6D00" stop-opacity="0.2"/>
    <stop offset="50%" stop-color="#FF6D00" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#FF6D00" stop-opacity="0.2"/>
  </linearGradient>

  <!-- ── 24-cell polytope vertices (4D projected to 2D, scaled to 80px radius) ── -->
  <!-- Vertices of the 24-cell at (±1,±1,0,0) and permutations, projected to 2D -->
  <symbol id="polytope24" viewBox="-100 -100 200 200">
    <g stroke="#45B7D1" stroke-width="0.5" fill="none" opacity="0.4">
      <!-- Outer hex ring (8 cells projected) -->
      <polygon points="80,0 40,69 -40,69 -80,0 -40,-69 40,-69"/>
      <!-- Inner hex ring (rotated) -->
      <polygon points="60,35 0,69 -60,35 -60,-35 0,-69 60,-35"/>
      <!-- Connecting edges to form cell-projection -->
      <line x1="80" y1="0" x2="60" y2="35"/>
      <line x1="40" y1="69" x2="0" y2="69"/>
      <line x1="-40" y1="69" x2="-60" y2="35"/>
      <line x1="-80" y1="0" x2="-60" y2="-35"/>
      <line x1="-40" y1="-69" x2="0" y2="-69"/>
      <line x1="40" y1="-69" x2="60" y2="-35"/>
      <!-- Diagonals through center -->
      <line x1="80" y1="0" x2="-80" y2="0" opacity="0.25"/>
      <line x1="40" y1="69" x2="-40" y2="-69" opacity="0.25"/>
      <line x1="-40" y1="69" x2="40" y2="-69" opacity="0.25"/>
    </g>
    <g fill="#45B7D1" opacity="0.75">
      <circle cx="80" cy="0" r="1.5"/>
      <circle cx="40" cy="69" r="1.5"/>
      <circle cx="-40" cy="69" r="1.5"/>
      <circle cx="-80" cy="0" r="1.5"/>
      <circle cx="-40" cy="-69" r="1.5"/>
      <circle cx="40" cy="-69" r="1.5"/>
      <circle cx="60" cy="35" r="1.5"/>
      <circle cx="0" cy="69" r="1.5"/>
      <circle cx="-60" cy="35" r="1.5"/>
      <circle cx="-60" cy="-35" r="1.5"/>
      <circle cx="0" cy="-69" r="1.5"/>
      <circle cx="60" cy="-35" r="1.5"/>
    </g>
  </symbol>
</defs>

<!-- ── Background ── -->
<rect width="1200" height="675" fill="#04060f"/>
<rect width="1200" height="675" fill="url(#dots)"/>

<!-- ── Subtle 4D polytope decoration in upper-right (24-cell) ── -->
<g opacity="0.35" class="f4">
  <use href="#polytope24" x="1010" y="80" width="160" height="160"/>
</g>

<!-- ── Top label ── -->
<g class="f1">
  <text x="600" y="50" class="m" font-size="11" fill="#4d6280" text-anchor="middle" letter-spacing="4">LIGHT ARCHITECTS · THE THESIS</text>
</g>

<!-- ── Two side-by-side panels: BEFORE / AFTER ── -->
<!-- Section dividers -->
<line x1="600" y1="100" x2="600" y2="490" stroke="#172240" stroke-width="0.5" stroke-dasharray="3,5" opacity="0.6"/>

<!-- ────────── LEFT: BEFORE — stateless LLM tool calls ────────── -->
<g class="f1">
  <text x="80" y="125" class="m" font-size="10" fill="#5a6473" letter-spacing="2.5">CURRENT STATE — LLMs as stateless callers</text>
  <text x="80" y="160" class="s" font-size="22" fill="#dce8f5" font-weight="600">Every session starts from zero.</text>
  <text x="80" y="190" class="s" font-size="15" fill="#8a929d">Tool calls don't remember the last one.</text>
  <text x="80" y="212" class="s" font-size="15" fill="#8a929d">Correctness is an aspiration, not a guarantee.</text>
</g>

<!-- Scattered, dim, jittering dots representing stateless calls -->
<g class="f2">
  <g class="before-dot" style="animation-delay:0s">
    <circle cx="120" cy="280" r="3" fill="#4d6280" opacity="0.7"/>
    <circle cx="120" cy="280" r="6" fill="none" stroke="#4d6280" stroke-width="0.3" opacity="0.3"/>
  </g>
  <g class="before-dot" style="animation-delay:0.4s">
    <circle cx="185" cy="265" r="3" fill="#5a6473" opacity="0.7"/>
  </g>
  <g class="before-dot" style="animation-delay:0.8s">
    <circle cx="255" cy="295" r="3" fill="#4d6280" opacity="0.7"/>
    <circle cx="255" cy="295" r="5" fill="none" stroke="#5a6473" stroke-width="0.3" opacity="0.3"/>
  </g>
  <g class="before-dot" style="animation-delay:1.2s">
    <circle cx="335" cy="270" r="3" fill="#5a6473" opacity="0.7"/>
  </g>
  <g class="before-dot" style="animation-delay:0.6s">
    <circle cx="425" cy="310" r="3" fill="#4d6280" opacity="0.7"/>
  </g>
  <g class="before-dot" style="animation-delay:1.0s">
    <circle cx="495" cy="278" r="3" fill="#5a6473" opacity="0.7"/>
    <circle cx="495" cy="278" r="6" fill="none" stroke="#4d6280" stroke-width="0.3" opacity="0.3"/>
  </g>
  <g class="before-dot" style="animation-delay:0.2s">
    <circle cx="135" cy="350" r="3" fill="#4d6280" opacity="0.7"/>
  </g>
  <g class="before-dot" style="animation-delay:1.4s">
    <circle cx="210" cy="375" r="3" fill="#5a6473" opacity="0.7"/>
  </g>
  <g class="before-dot" style="animation-delay:0.5s">
    <circle cx="285" cy="345" r="3" fill="#4d6280" opacity="0.7"/>
  </g>
  <g class="before-dot" style="animation-delay:1.1s">
    <circle cx="375" cy="385" r="3" fill="#5a6473" opacity="0.7"/>
  </g>
  <g class="before-dot" style="animation-delay:0.3s">
    <circle cx="465" cy="360" r="3" fill="#4d6280" opacity="0.7"/>
    <circle cx="465" cy="360" r="5" fill="none" stroke="#4d6280" stroke-width="0.3" opacity="0.3"/>
  </g>
  <g class="before-dot" style="animation-delay:0.9s">
    <circle cx="160" cy="420" r="3" fill="#5a6473" opacity="0.7"/>
  </g>
  <g class="before-dot" style="animation-delay:1.3s">
    <circle cx="240" cy="445" r="3" fill="#4d6280" opacity="0.7"/>
  </g>
  <g class="before-dot" style="animation-delay:0.7s">
    <circle cx="335" cy="425" r="3" fill="#5a6473" opacity="0.7"/>
  </g>
  <g class="before-dot" style="animation-delay:1.5s">
    <circle cx="425" cy="445" r="3" fill="#4d6280" opacity="0.7"/>
  </g>
  <g class="before-dot" style="animation-delay:0.1s">
    <circle cx="510" cy="420" r="3" fill="#5a6473" opacity="0.7"/>
  </g>
</g>

<!-- ────────── RIGHT: AFTER — Light Architects helix ────────── -->
<g class="f1">
  <text x="650" y="125" class="m" font-size="10" fill="#5a6473" letter-spacing="2.5">LIGHT ARCHITECTS — agents as operators</text>
  <text x="650" y="160" class="s" font-size="22" fill="#dce8f5" font-weight="600">Continuity is substrate.</text>
  <text x="650" y="190" class="s" font-size="15" fill="#8a929d">Every interaction strengthens the next.</text>
  <text x="650" y="212" class="s" font-size="15" fill="#8a929d">Correctness is provable at compile time.</text>
</g>

<!-- 4 helix strands with bloom — each a sibling color -->
<g class="f3" filter="url(#bloom)">
  <!-- EVA strand — hot pink, twisting helix-like sine wave -->
  <g class="after-line" style="animation-delay:0s">
    <path d="M 720 260 Q 750 300, 720 340 Q 690 380, 720 420 Q 750 460, 720 480"
          stroke="url(#strand-eva)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- CORSO strand — sky blue, offset phase -->
  <g class="after-line" style="animation-delay:0.4s">
    <path d="M 790 260 Q 760 300, 790 340 Q 820 380, 790 420 Q 760 460, 790 480"
          stroke="url(#strand-corso)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- SOUL strand — emerald (knowledge graph) -->
  <g class="after-line" style="animation-delay:0.2s">
    <path d="M 870 260 Q 900 300, 870 340 Q 840 380, 870 420 Q 900 460, 870 480"
          stroke="url(#strand-soul)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- AYIN strand — deep orange (observability) -->
  <g class="after-line" style="animation-delay:0.6s">
    <path d="M 940 260 Q 910 300, 940 340 Q 970 380, 940 420 Q 910 460, 940 480"
          stroke="url(#strand-ayin)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
</g>

<!-- Bright vertex nodes on each strand — the persistent identity points -->
<g class="f3">
  <circle cx="720" cy="260" r="3.5" fill="#FF1493"/>
  <circle cx="720" cy="340" r="3.5" fill="#FF1493"/>
  <circle cx="720" cy="420" r="3.5" fill="#FF1493"/>
  <circle cx="720" cy="480" r="3.5" fill="#FF1493"/>

  <circle cx="790" cy="260" r="3.5" fill="#00BFFF"/>
  <circle cx="790" cy="340" r="3.5" fill="#00BFFF"/>
  <circle cx="790" cy="420" r="3.5" fill="#00BFFF"/>
  <circle cx="790" cy="480" r="3.5" fill="#00BFFF"/>

  <circle cx="870" cy="260" r="3.5" fill="#34D399"/>
  <circle cx="870" cy="340" r="3.5" fill="#34D399"/>
  <circle cx="870" cy="420" r="3.5" fill="#34D399"/>
  <circle cx="870" cy="480" r="3.5" fill="#34D399"/>

  <circle cx="940" cy="260" r="3.5" fill="#FF6D00"/>
  <circle cx="940" cy="340" r="3.5" fill="#FF6D00"/>
  <circle cx="940" cy="420" r="3.5" fill="#FF6D00"/>
  <circle cx="940" cy="480" r="3.5" fill="#FF6D00"/>
</g>

<!-- Inter-strand connections suggesting memory cross-references -->
<g class="f4" opacity="0.5">
  <line x1="720" y1="340" x2="870" y2="340" stroke="#45B7D1" stroke-width="0.6" stroke-dasharray="2,3"/>
  <line x1="790" y1="260" x2="940" y2="260" stroke="#45B7D1" stroke-width="0.6" stroke-dasharray="2,3"/>
  <line x1="790" y1="420" x2="940" y2="420" stroke="#45B7D1" stroke-width="0.6" stroke-dasharray="2,3"/>
  <line x1="720" y1="480" x2="870" y2="480" stroke="#45B7D1" stroke-width="0.6" stroke-dasharray="2,3"/>
</g>

<!-- ────────── BOTTOM: THREE LOAD-BEARING ASSUMPTIONS ────────── -->
<line x1="80" y1="525" x2="1120" y2="525" stroke="#172240" stroke-width="0.6"/>

<g class="f4">
  <text x="600" y="555" class="m" font-size="10" fill="#5a6473" text-anchor="middle" letter-spacing="3">THREE LOAD-BEARING ASSUMPTIONS</text>
</g>

<!-- Pillar 1 -->
<g class="f4">
  <text x="180" y="595" class="m" font-size="9" fill="#FF1493" letter-spacing="1.5">PILLAR 1</text>
  <text x="180" y="615" class="s" font-size="14" fill="#dce8f5" font-weight="600">Memory is substrate, not metadata.</text>
  <text x="180" y="635" class="s" font-size="11" fill="#8a929d">Agent identity, growth, and inter-agent relationships</text>
  <text x="180" y="650" class="s" font-size="11" fill="#8a929d">are first-class graph nodes — not flat embeddings.</text>
</g>

<!-- Pillar 2 -->
<g class="f4">
  <text x="500" y="595" class="m" font-size="9" fill="#00BFFF" letter-spacing="1.5">PILLAR 2</text>
  <text x="500" y="615" class="s" font-size="14" fill="#dce8f5" font-weight="600">The operator always wins.</text>
  <text x="500" y="635" class="s" font-size="11" fill="#8a929d">Human actions supersede in-flight LLM work.</text>
  <text x="500" y="650" class="s" font-size="11" fill="#8a929d">HMAC-chained audit trails make every supersedure traceable.</text>
</g>

<!-- Pillar 3 -->
<g class="f4">
  <text x="820" y="595" class="m" font-size="9" fill="#34D399" letter-spacing="1.5">PILLAR 3</text>
  <text x="820" y="615" class="s" font-size="14" fill="#dce8f5" font-weight="600">Correctness is provable.</text>
  <text x="820" y="635" class="s" font-size="11" fill="#8a929d">Retrieval invariants, parallel-execution safety, and</text>
  <text x="820" y="650" class="s" font-size="11" fill="#8a929d">merge-gate constraints encoded as Lean 4 / Mathlib proofs.</text>
</g>

</svg>
