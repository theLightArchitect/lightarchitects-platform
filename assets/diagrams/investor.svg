<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
<defs>
<style>
  .m{font-family:'JetBrains Mono','Courier New',monospace}
  .s{font-family:-apple-system,'Segoe UI','Helvetica Neue',sans-serif}
  @keyframes r1{0%,8%{opacity:0}24%,100%{opacity:1}}
  @keyframes r2{0%,22%{opacity:0}38%,100%{opacity:1}}
  @keyframes r3{0%,36%{opacity:0}52%,100%{opacity:1}}
  @keyframes r4{0%,50%{opacity:0}66%,100%{opacity:1}}
  @keyframes r5{0%,64%{opacity:0}78%,100%{opacity:1}}
  @keyframes r6{0%,76%{opacity:0}90%,100%{opacity:1}}
  @keyframes shimmer{0%,100%{opacity:.85}50%{opacity:1}}
  .l1{animation:r1 4s ease-out both}
  .l2{animation:r2 4s ease-out both}
  .l3{animation:r3 4s ease-out both}
  .l4{animation:r4 4s ease-out both}
  .l5{animation:r5 4s ease-out both}
  .l6{animation:r6 4s ease-out both}
  .sh{animation:shimmer 3.5s ease-in-out infinite}
</style>

<!-- ── Bloom filter — multi-layer Gaussian for the helix-product signature glow ── -->
<filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
  <feGaussianBlur stdDeviation="1.6" result="b1"/>
  <feGaussianBlur stdDeviation="4" result="b2"/>
  <feGaussianBlur stdDeviation="9" result="b3"/>
  <feMerge>
    <feMergeNode in="b3"/>
    <feMergeNode in="b2"/>
    <feMergeNode in="b1"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<!-- ── Soft bloom — for text accents ── -->
<filter id="softbloom" x="-30%" y="-30%" width="160%" height="160%">
  <feGaussianBlur stdDeviation="0.8" result="b1"/>
  <feGaussianBlur stdDeviation="2.5" result="b2"/>
  <feMerge>
    <feMergeNode in="b2"/>
    <feMergeNode in="b1"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<!-- ── Canonical helix gradient — for hero text ── -->
<linearGradient id="hero-grad" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#00BFFF"/>
  <stop offset="33%" stop-color="#FF1493"/>
  <stop offset="66%" stop-color="#B44AFF"/>
  <stop offset="100%" stop-color="#34D399"/>
</linearGradient>

<!-- ── Ambient glow gradients (canonical sibling colors) ── -->
<radialGradient id="ambient-corso" cx="50%" cy="50%" r="50%">
  <stop offset="0%" stop-color="rgba(0,191,255,0.10)"/>
  <stop offset="100%" stop-color="rgba(0,191,255,0)"/>
</radialGradient>
<radialGradient id="ambient-eva" cx="50%" cy="50%" r="50%">
  <stop offset="0%" stop-color="rgba(255,20,147,0.09)"/>
  <stop offset="100%" stop-color="rgba(255,20,147,0)"/>
</radialGradient>

<!-- Background grid pattern -->
<pattern id="grid-p" width="48" height="48" patternUnits="userSpaceOnUse">
  <path d="M48 0 L0 0 L0 48" fill="none" stroke="rgba(129,140,248,.028)" stroke-width="1"/>
</pattern>

<!-- Subtle 24-cell polytope (4D projection) for top-right decoration -->
<symbol id="polytope24" viewBox="-100 -100 200 200">
  <g stroke="#45B7D1" stroke-width="0.6" fill="none" opacity="0.5">
    <polygon points="80,0 40,69 -40,69 -80,0 -40,-69 40,-69"/>
    <polygon points="60,35 0,69 -60,35 -60,-35 0,-69 60,-35"/>
    <line x1="80" y1="0" x2="60" y2="35"/>
    <line x1="40" y1="69" x2="0" y2="69"/>
    <line x1="-40" y1="69" x2="-60" y2="35"/>
    <line x1="-80" y1="0" x2="-60" y2="-35"/>
    <line x1="-40" y1="-69" x2="0" y2="-69"/>
    <line x1="40" y1="-69" x2="60" y2="-35"/>
    <line x1="80" y1="0" x2="-80" y2="0" opacity="0.3"/>
    <line x1="40" y1="69" x2="-40" y2="-69" opacity="0.3"/>
    <line x1="-40" y1="69" x2="40" y2="-69" opacity="0.3"/>
  </g>
  <g fill="#45B7D1" opacity="0.85">
    <circle cx="80" cy="0" r="1.8"/>
    <circle cx="40" cy="69" r="1.8"/>
    <circle cx="-40" cy="69" r="1.8"/>
    <circle cx="-80" cy="0" r="1.8"/>
    <circle cx="-40" cy="-69" r="1.8"/>
    <circle cx="40" cy="-69" r="1.8"/>
    <circle cx="60" cy="35" r="1.8"/>
    <circle cx="0" cy="69" r="1.8"/>
    <circle cx="-60" cy="35" r="1.8"/>
    <circle cx="-60" cy="-35" r="1.8"/>
    <circle cx="0" cy="-69" r="1.8"/>
    <circle cx="60" cy="-35" r="1.8"/>
  </g>
</symbol>
</defs>

<!-- ── Background ── -->
<rect width="900" height="620" fill="#04060f"/>
<rect width="900" height="620" fill="url(#grid-p)"/>

<!-- Ambient glows -->
<ellipse cx="180" cy="180" rx="240" ry="200" fill="url(#ambient-corso)" class="l1"/>
<ellipse cx="720" cy="400" rx="220" ry="200" fill="url(#ambient-eva)" class="l4"/>

<!-- Subtle 24-cell polytope in upper-right -->
<g opacity="0.4" class="l1">
  <use href="#polytope24" x="800" y="0" width="110" height="110"/>
</g>

<!-- ── HERO ── -->
<g class="l1">
  <text x="450" y="44" class="m" font-size="9" fill="#5a6473" text-anchor="middle" letter-spacing="4">AI-NATIVE ENGINEERING PLATFORM</text>
  <line x1="80" y1="39" x2="305" y2="39" stroke="#172240" stroke-width="1"/>
  <line x1="595" y1="39" x2="780" y2="39" stroke="#172240" stroke-width="1"/>
  <text x="450" y="82" class="s" font-size="44" font-weight="800" text-anchor="middle" letter-spacing="-1.2" fill="url(#hero-grad)">The Light Squad.</text>
  <text x="450" y="124" class="s" font-size="28" fill="#f0f6ff" font-weight="700" text-anchor="middle" letter-spacing="-0.5">Your AI Engineering Team.</text>
  <text x="450" y="152" class="s" font-size="13" fill="#8a929d" text-anchor="middle">Your copilot between intent and coding agents — code stays local, 7 specialists, quality gate every wave.</text>
</g>

