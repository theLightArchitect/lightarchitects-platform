  <text x="655" y="202" class="s" font-size="26" fill="#B44AFF" font-weight="800" text-anchor="middle">96.2%</text>
  <text x="655" y="219" class="m" font-size="7.5" fill="#dce8f5" text-anchor="middle" letter-spacing="1">MEMORY ACCURACY</text>
  <text x="655" y="233" class="m" font-size="7" fill="#5a6473" text-anchor="middle" font-style="italic">recall@5 · LongMemEval benchmark</text>

  <!-- Zero Telemetry -->
  <rect x="740" y="172" width="140" height="70" rx="5" fill="#070c1a" stroke="rgba(129,140,248,0.4)" stroke-width="1"/>
  <text x="810" y="202" class="s" font-size="26" fill="#818CF8" font-weight="800" text-anchor="middle">ZERO</text>
  <text x="810" y="219" class="m" font-size="7.5" fill="#dce8f5" text-anchor="middle" letter-spacing="1">TELEMETRY</text>
  <text x="810" y="233" class="m" font-size="7" fill="#5a6473" text-anchor="middle">Your data stays yours</text>
</g>

<line x1="20" y1="256" x2="880" y2="256" stroke="#172240" stroke-width="1" class="l2"/>

<!-- ── THREE PILLARS — softened claims, canonical palette ── -->
