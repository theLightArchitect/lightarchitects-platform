  <text x="365" y="219" class="m" font-size="7.5" fill="#dce8f5" text-anchor="middle" letter-spacing="1">BUILD WORKERS</text>
  <text x="365" y="233" class="m" font-size="7" fill="#5a6473" text-anchor="middle">Concurrent max</text>

  <!-- 8+ Providers (was "7+") -->
  <rect x="440" y="172" width="130" height="70" rx="5" fill="#070c1a" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="505" y="202" class="s" font-size="26" fill="#F59E0B" font-weight="800" text-anchor="middle">8+</text>
