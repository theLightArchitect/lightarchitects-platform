  <text x="225" y="219" class="m" font-size="7.5" fill="#dce8f5" text-anchor="middle" letter-spacing="1">DOMAIN AGENTS</text>
  <text x="225" y="233" class="m" font-size="7" fill="#5a6473" text-anchor="middle">Parallel specialists</text>

