  <rect x="20" y="172" width="130" height="70" rx="5" fill="#070c1a" stroke="rgba(0,191,255,0.4)" stroke-width="1"/>
  <text x="85" y="202" class="s" font-size="26" fill="#00BFFF" font-weight="800" text-anchor="middle">23</text>
  <text x="85" y="219" class="m" font-size="7.5" fill="#dce8f5" text-anchor="middle" letter-spacing="1">SDK MODULES</text>
  <text x="85" y="233" class="m" font-size="7" fill="#5a6473" text-anchor="middle">Multi-module Rust SDK</text>

