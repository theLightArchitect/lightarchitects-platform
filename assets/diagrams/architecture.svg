<!-- ── AYIN OBSERVABILITY ── -->
<g class="l5">
  <text x="20" y="567" class="m" font-size="7.5" fill="#4d6280" letter-spacing="2">OBSERVABILITY</text>
  <rect x="20" y="552" width="860" height="80" rx="5" fill="#070c1a" stroke="#FF6D00" stroke-width="1.5" stroke-opacity=".65"/>
  <rect x="20" y="552" width="860" height="80" rx="5" fill="rgba(255,109,0,.025)" class="gw"/>
  <text x="40" y="577" class="s" font-size="13.5" fill="#dce8f5" font-weight="700">AYIN · Real-Time Observability · HTTP :3742</text>
  <text x="40" y="597" class="m" font-size="8" fill="#4d6280">Atomic span writes · power-loss durability (F_FULLFSYNC) · Lineage Circuit visualization · 0600 perms</text>
