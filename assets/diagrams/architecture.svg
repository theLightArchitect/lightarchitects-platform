  <text x="578" y="494" class="m" font-size="8" fill="#4d6280">247K conversation turns</text>
  <text x="578" y="510" class="m" font-size="8" fill="#4d6280">Helix · compounding context</text>
</g>

<!-- Divider between router and knowledge -->
<line x1="562" y1="392" x2="880" y2="392" stroke="#172240" stroke-width="1" class="l3"/>

<!-- CONNECTIONS: Agents + Knowledge → AYIN -->
<g class="c3">
  <line x1="285" y1="520" x2="285" y2="552" stroke="#FF6D00" stroke-width="1.5" stroke-opacity=".5"/>
  <line x1="720" y1="518" x2="720" y2="552" stroke="#FF6D00" stroke-width="1.5" stroke-opacity=".5"/>
  <polygon points="285,552 281,544 289,544" fill="#FF6D00" opacity=".5"/>
  <polygon points="720,552 716,544 724,544" fill="#FF6D00" opacity=".5"/>
