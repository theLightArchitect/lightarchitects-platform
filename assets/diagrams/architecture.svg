  <text x="372" y="308" class="m" font-size="7.5" fill="#34d399">[K][D]</text>
  <text x="372" y="324" class="s" font-size="12.5" fill="#dce8f5" font-weight="700">SOUL</text>
  <text x="372" y="341" class="m" font-size="7.5" fill="#4d6280">Knowledge Graph · Neo4j</text>

  <!-- QUANTUM -->
