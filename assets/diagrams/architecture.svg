  <text x="578" y="359" class="m" font-size="8" fill="#4d6280">Ollama Cloud · OpenAI-compat</text>
  <text x="578" y="375" class="m" font-size="8" fill="#4d6280">OpenRouter · LiteLLM · Azure</text>
</g>

