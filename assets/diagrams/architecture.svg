<!-- ── MODEL ROUTER ── -->
<g class="l3">
  <text x="562" y="294" class="m" font-size="7.5" fill="#4d6280" letter-spacing="2">MODEL ROUTER</text>
  <rect x="562" y="278" width="318" height="112" rx="5" fill="rgba(245,158,11,.03)" stroke="rgba(245,158,11,.35)" stroke-width="1"/>
