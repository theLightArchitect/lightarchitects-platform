  <text x="372" y="380" class="m" font-size="7.5" fill="#818cf8">[C]</text>
  <text x="372" y="396" class="s" font-size="12.5" fill="#dce8f5" font-weight="700">LÆX</text>
  <text x="372" y="413" class="m" font-size="7.5" fill="#4d6280">Canon Keeper · Governance</text>

  <!-- Wave engine banner -->
  <rect x="32" y="434" width="506" height="76" rx="4" fill="rgba(52,211,153,.04)" stroke="rgba(52,211,153,.22)" stroke-width="1"/>
  <text x="285" y="454" class="m" font-size="9" fill="#34d399" text-anchor="middle">LightSquad Wave Engine</text>
  <text x="285" y="471" class="m" font-size="7.5" fill="#4d6280" text-anchor="middle">Up to 7 parallel workers · file-ownership partitioning · max 3 self-correction iterations</text>
  <text x="285" y="487" class="m" font-size="7.5" fill="#4d6280" text-anchor="middle">[A] [S] [Q] [C] [O] [P] [K] [D] [T] [R]  —  10-dimension merge gate</text>

  <text x="285" y="514" class="m" font-size="7.5" fill="#4d6280" text-anchor="middle">subprocess stdio JSON-RPC 2.0 · spawned on-demand</text>
