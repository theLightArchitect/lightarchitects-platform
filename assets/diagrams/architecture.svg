  <text x="44" y="380" class="m" font-size="7.5" fill="#B44AFF">[R]</text>
  <text x="44" y="396" class="s" font-size="12.5" fill="#dce8f5" font-weight="700">QUANTUM</text>
  <text x="44" y="413" class="m" font-size="7.5" fill="#4d6280">Forensic · Research</text>

  <!-- SERAPH -->
  <rect x="196" y="362" width="158" height="62" rx="4" fill="#070c1a" stroke="rgba(255,0,64,.45)" stroke-width="1"/>
  <text x="208" y="380" class="m" font-size="7.5" fill="#FF0040">[S]</text>
  <text x="208" y="396" class="s" font-size="12.5" fill="#dce8f5" font-weight="700">SERAPH</text>
  <text x="208" y="413" class="m" font-size="7.5" fill="#4d6280">Red Team · AppSec</text>

  <!-- LÆX -->
