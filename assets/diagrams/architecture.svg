  <!-- CORSO -->
  <rect x="32" y="290" width="158" height="62" rx="4" fill="#070c1a" stroke="rgba(0,191,255,.45)" stroke-width="1"/>
  <text x="44" y="308" class="m" font-size="7.5" fill="#00BFFF">[A][Q][T]</text>
  <text x="44" y="324" class="s" font-size="12.5" fill="#dce8f5" font-weight="700">CORSO</text>
  <text x="44" y="341" class="m" font-size="7.5" fill="#4d6280">Engineer · Security Orch.</text>

  <!-- EVA -->
