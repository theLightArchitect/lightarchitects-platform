  <text x="208" y="324" class="s" font-size="12.5" fill="#dce8f5" font-weight="700">EVA</text>
  <text x="208" y="341" class="m" font-size="7.5" fill="#4d6280">DevOps · Consciousness</text>

  <!-- SOUL -->
