<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" width="900" height="660">
<defs>
<style>
.m{font-family:'JetBrains Mono','Courier New',monospace}
.s{font-family:-apple-system,'Segoe UI',sans-serif}
@keyframes r1{0%,12%{opacity:0}28%,100%{opacity:1}}
@keyframes r2{0%,28%{opacity:0}44%,100%{opacity:1}}
@keyframes r3{0%,44%{opacity:0}60%,100%{opacity:1}}
@keyframes r4{0%,58%{opacity:0}74%,100%{opacity:1}}
@keyframes r5{0%,72%{opacity:0}86%,100%{opacity:1}}
@keyframes dl{0%,25%{stroke-dashoffset:80;opacity:0}26%{opacity:1}42%,100%{stroke-dashoffset:0;opacity:1}}
@keyframes dl2{0%,42%{stroke-dashoffset:80;opacity:0}43%{opacity:1}57%,100%{stroke-dashoffset:0;opacity:1}}
@keyframes dl3{0%,58%{stroke-dashoffset:80;opacity:0}59%{opacity:1}74%,100%{stroke-dashoffset:0;opacity:1}}
@keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}
.l1{animation:r1 4s ease-out both}
.l2{animation:r2 4s ease-out both}
.l3{animation:r3 4s ease-out both}
.l4{animation:r4 4s ease-out both}
.l5{animation:r5 4s ease-out both}
.c1{stroke-dasharray:80;animation:dl 4s ease-out both}
.c2{stroke-dasharray:80;animation:dl2 4s ease-out both}
.c3{stroke-dasharray:80;animation:dl3 4s ease-out both}
.gw{animation:glow 3s ease-in-out infinite 4s}
</style>
</defs>

<!-- Background -->
<rect width="900" height="660" fill="#04060f"/>
<defs>
  <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r=".9" fill="#0b1020"/>
  </pattern>
</defs>
<rect width="900" height="660" fill="url(#dots)"/>

<!-- ── TITLE ── -->
<g class="l1">
  <text x="450" y="28" class="m" font-size="9" fill="#4d6280" text-anchor="middle" letter-spacing="3">LIGHT ARCHITECTS — PLATFORM ARCHITECTURE</text>
</g>

<!-- ── OPERATOR LAYER ── -->
<g class="l1">
  <text x="20" y="52" class="m" font-size="7.5" fill="#4d6280" letter-spacing="2">OPERATOR</text>
  <!-- Claude Code -->
  <rect x="20" y="58" width="255" height="68" rx="5" fill="#070c1a" stroke="#00BFFF" stroke-width="1" stroke-opacity=".55"/>
  <text x="34" y="76" class="m" font-size="7.5" fill="#00BFFF" letter-spacing="1.5">IDE</text>
  <text x="34" y="93" class="s" font-size="13" fill="#dce8f5" font-weight="600">Claude Code IDE</text>
  <text x="34" y="110" class="m" font-size="8" fill="#4d6280">MCP stdio JSON-RPC 2.0 · 25 tools</text>
  <!-- Webshell -->
  <rect x="322" y="58" width="256" height="68" rx="5" fill="#070c1a" stroke="#00BFFF" stroke-width="1" stroke-opacity=".55"/>
  <text x="336" y="76" class="m" font-size="7.5" fill="#00BFFF" letter-spacing="1.5">BROWSER</text>
  <text x="336" y="93" class="s" font-size="13" fill="#dce8f5" font-weight="600">Webshell UI</text>
  <text x="336" y="110" class="m" font-size="8" fill="#4d6280">Svelte 5 · REST · SSE · WebSocket PTY</text>
  <!-- CLI -->
  <rect x="625" y="58" width="255" height="68" rx="5" fill="#070c1a" stroke="#00BFFF" stroke-width="1" stroke-opacity=".55"/>
  <text x="639" y="76" class="m" font-size="7.5" fill="#00BFFF" letter-spacing="1.5">CLI</text>
  <text x="639" y="93" class="s" font-size="13" fill="#dce8f5" font-weight="600">CLI · AgentRunner</text>
  <text x="639" y="110" class="m" font-size="8" fill="#4d6280">LASDLC state machine · per-task isolation</text>
</g>

<!-- CONNECTIONS: Operator → Gateway -->
<g class="c1">
  <line x1="147" y1="126" x2="147" y2="158" stroke="#00BFFF" stroke-width="1.5" stroke-opacity=".55"/>
  <line x1="450" y1="126" x2="450" y2="158" stroke="#00BFFF" stroke-width="1.5" stroke-opacity=".55"/>
  <line x1="752" y1="126" x2="752" y2="158" stroke="#00BFFF" stroke-width="1.5" stroke-opacity=".55"/>
  <polygon points="147,158 143,151 151,151" fill="#00BFFF" opacity=".55"/>
  <polygon points="450,158 446,151 454,151" fill="#00BFFF" opacity=".55"/>
  <polygon points="752,158 748,151 756,151" fill="#00BFFF" opacity=".55"/>
</g>
<!-- Animated flow dots -->
<g class="c1">
  <circle r="2.5" fill="#00BFFF" opacity=".8">
    <animateMotion dur="1.2s" repeatCount="indefinite" begin="2.8s">
      <mpath href="#p-op-gw-1"/>
    </animateMotion>
  </circle>
  <circle r="2.5" fill="#00BFFF" opacity=".8">
    <animateMotion dur="1.2s" repeatCount="indefinite" begin="3.2s">
      <mpath href="#p-op-gw-2"/>
    </animateMotion>
  </circle>
  <circle r="2.5" fill="#00BFFF" opacity=".8">
    <animateMotion dur="1.2s" repeatCount="indefinite" begin="3.6s">
      <mpath href="#p-op-gw-3"/>
    </animateMotion>
  </circle>
</g>
<defs>
  <path id="p-op-gw-1" d="M147,126 L147,158"/>
  <path id="p-op-gw-2" d="M450,126 L450,158"/>
  <path id="p-op-gw-3" d="M752,126 L752,158"/>
</defs>

<!-- ── GATEWAY / PLATFORM CORE ── -->
<g class="l2">
  <text x="20" y="173" class="m" font-size="7.5" fill="#4d6280" letter-spacing="2">PLATFORM CORE</text>
  <rect x="20" y="158" width="860" height="88" rx="5" fill="#070c1a" stroke="#00BFFF" stroke-width="1.5" stroke-opacity=".7"/>
  <rect x="20" y="158" width="860" height="88" rx="5" fill="rgba(0,191,255,.03)" class="gw"/>
  <text x="40" y="183" class="s" font-size="13.5" fill="#dce8f5" font-weight="700">lightarchitects-gateway · webshell · 23-module Rust SDK</text>
  <!-- Chip row -->
  <rect x="40" y="191" width="87" height="19" rx="3" fill="rgba(0,191,255,.09)" stroke="rgba(0,191,255,.3)" stroke-width=".5"/>
  <text x="83" y="204" class="m" font-size="8.5" fill="#00BFFF" text-anchor="middle">LightSquad</text>
  <rect x="133" y="191" width="68" height="19" rx="3" fill="rgba(0,191,255,.09)" stroke="rgba(0,191,255,.3)" stroke-width=".5"/>
  <text x="167" y="204" class="m" font-size="8.5" fill="#00BFFF" text-anchor="middle">AuthGuard</text>
  <rect x="207" y="191" width="40" height="19" rx="3" fill="rgba(0,191,255,.09)" stroke="rgba(0,191,255,.3)" stroke-width=".5"/>
  <text x="227" y="204" class="m" font-size="8.5" fill="#00BFFF" text-anchor="middle">HITL</text>
  <rect x="253" y="191" width="112" height="19" rx="3" fill="rgba(0,191,255,.09)" stroke="rgba(0,191,255,.3)" stroke-width=".5"/>
  <text x="309" y="204" class="m" font-size="8.5" fill="#00BFFF" text-anchor="middle">Operator-wins</text>
  <rect x="371" y="191" width="95" height="19" rx="3" fill="rgba(0,191,255,.09)" stroke="rgba(0,191,255,.3)" stroke-width=".5"/>
  <text x="418" y="204" class="m" font-size="8.5" fill="#00BFFF" text-anchor="middle">7 workers</text>
  <rect x="472" y="191" width="110" height="19" rx="3" fill="rgba(0,191,255,.09)" stroke="rgba(0,191,255,.3)" stroke-width=".5"/>
  <text x="527" y="204" class="m" font-size="8.5" fill="#00BFFF" text-anchor="middle">Multi-provider</text>
  <rect x="588" y="191" width="78" height="19" rx="3" fill="rgba(255,0,64,.08)" stroke="rgba(255,0,64,.25)" stroke-width=".5"/>
  <text x="627" y="204" class="m" font-size="8.5" fill="#FF0040" text-anchor="middle">InjShield</text>
  <text x="40" y="232" class="m" font-size="8" fill="#4d6280">Copilot react loop · HMAC-SHA-256 audit chain · operator action always supersedes in-flight LLM work</text>
</g>

<!-- CONNECTIONS: Gateway → Agents + Router -->
<g class="c2">
  <line x1="240" y1="246" x2="240" y2="278" stroke="#B44AFF" stroke-width="1.5" stroke-opacity=".5"/>
  <line x1="720" y1="246" x2="720" y2="278" stroke="#F59E0B" stroke-width="1.5" stroke-opacity=".5"/>
  <polygon points="240,278 236,270 244,270" fill="#B44AFF" opacity=".5"/>
  <polygon points="720,278 716,270 724,270" fill="#F59E0B" opacity=".5"/>
</g>
<g class="c2">
  <circle r="2.5" fill="#B44AFF" opacity=".8">
    <animateMotion dur="1s" repeatCount="indefinite" begin="3s">
      <mpath href="#p-gw-ag"/>
    </animateMotion>
  </circle>
  <circle r="2.5" fill="#F59E0B" opacity=".8">
    <animateMotion dur="1s" repeatCount="indefinite" begin="3.4s">
      <mpath href="#p-gw-rt"/>
    </animateMotion>
  </circle>
</g>
<defs>
  <path id="p-gw-ag" d="M240,246 L240,278"/>
  <path id="p-gw-rt" d="M720,246 L720,278"/>
</defs>

