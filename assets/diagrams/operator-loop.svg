<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
<defs>
  <style>
    .m{font-family:'JetBrains Mono','Courier New',monospace}
    .s{font-family:-apple-system,'Segoe UI','Helvetica Neue',sans-serif}
    @keyframes flow{0%{stroke-dashoffset:40}100%{stroke-dashoffset:0}}
    @keyframes pulse{0%,100%{opacity:.85}50%{opacity:1}}
    @keyframes reveal1{0%,8%{opacity:0}25%,100%{opacity:1}}
    @keyframes reveal2{0%,20%{opacity:0}37%,100%{opacity:1}}
    @keyframes reveal3{0%,32%{opacity:0}49%,100%{opacity:1}}
    @keyframes reveal4{0%,44%{opacity:0}61%,100%{opacity:1}}
    @keyframes reveal5{0%,56%{opacity:0}73%,100%{opacity:1}}
    @keyframes reveal6{0%,68%{opacity:0}85%,100%{opacity:1}}
    .r1{animation:reveal1 4s ease-out both}
    .r2{animation:reveal2 4s ease-out both}
    .r3{animation:reveal3 4s ease-out both}
    .r4{animation:reveal4 4s ease-out both}
    .r5{animation:reveal5 4s ease-out both}
    .r6{animation:reveal6 4s ease-out both}
    .flow-line{stroke-dasharray:8,4;animation:flow 1.5s linear infinite}
    .node-pulse{animation:pulse 3.5s ease-in-out infinite}
  </style>

  <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2.5" result="b1"/>
    <feGaussianBlur stdDeviation="6" result="b2"/>
    <feGaussianBlur stdDeviation="12" result="b3"/>
    <feMerge>
      <feMergeNode in="b3"/>
      <feMergeNode in="b2"/>
      <feMergeNode in="b1"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <filter id="softbloom" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="1.5" result="b1"/>
    <feGaussianBlur stdDeviation="3.5" result="b2"/>
    <feMerge>
      <feMergeNode in="b2"/>
      <feMergeNode in="b1"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <pattern id="dots" width="42" height="42" patternUnits="userSpaceOnUse">
    <circle cx="21" cy="21" r="0.8" fill="#0b1020"/>
  </pattern>

  <!-- Glow gradients for each node -->
  <radialGradient id="glow-claude" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#45B7D1" stop-opacity="0.95"/>
    <stop offset="60%" stop-color="#45B7D1" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#45B7D1" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow-corso" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00BFFF" stop-opacity="0.95"/>
    <stop offset="60%" stop-color="#00BFFF" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#00BFFF" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow-amber" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.95"/>
    <stop offset="60%" stop-color="#F59E0B" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow-soul" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#34D399" stop-opacity="0.95"/>
    <stop offset="60%" stop-color="#34D399" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow-eva" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FF1493" stop-opacity="0.95"/>
    <stop offset="60%" stop-color="#FF1493" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#FF1493" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow-ayin" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FF6D00" stop-opacity="0.95"/>
    <stop offset="60%" stop-color="#FF6D00" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#FF6D00" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- ── Background ── -->
<rect width="1200" height="675" fill="#04060f"/>
<rect width="1200" height="675" fill="url(#dots)"/>

<!-- ── Top label ── -->
<g class="r1">
  <text x="600" y="48" class="m" font-size="11" fill="#4d6280" text-anchor="middle" letter-spacing="4">LIGHT ARCHITECTS · THE OPERATOR LOOP</text>
  <text x="600" y="72" class="s" font-size="14" fill="#8a929d" text-anchor="middle">Every task moves through six stations — the platform earns its keep at each one.</text>
</g>

<!-- ────────── THE LOOP — circular arrangement ────────── -->
<!-- Center coordinates: 600, 360. Radius: 230. Six nodes at 60° spacing. -->

<!-- Connecting flow lines between nodes (the loop itself) -->
<g class="r6" opacity="0.7">
  <!-- Arcs between consecutive nodes -->
  <path d="M 760 220 A 230 230 0 0 1 830 360" stroke="#45B7D1" stroke-width="1.5" fill="none" class="flow-line" opacity="0.65"/>
  <path d="M 830 360 A 230 230 0 0 1 760 500" stroke="#F59E0B" stroke-width="1.5" fill="none" class="flow-line" opacity="0.65"/>
  <path d="M 760 500 A 230 230 0 0 1 440 500" stroke="#34D399" stroke-width="1.5" fill="none" class="flow-line" opacity="0.65"/>
  <path d="M 440 500 A 230 230 0 0 1 370 360" stroke="#FF1493" stroke-width="1.5" fill="none" class="flow-line" opacity="0.65"/>
  <path d="M 370 360 A 230 230 0 0 1 440 220" stroke="#FF6D00" stroke-width="1.5" fill="none" class="flow-line" opacity="0.65"/>
  <path d="M 440 220 A 230 230 0 0 1 760 220" stroke="#45B7D1" stroke-width="1.5" fill="none" class="flow-line" opacity="0.65"/>
</g>

<!-- ── Station 1 (top right): OPERATOR — Claude Code / Webshell / CLI ── -->
<g class="r1">
  <circle cx="760" cy="220" r="55" fill="url(#glow-claude)" filter="url(#bloom)"/>
  <circle cx="760" cy="220" r="32" fill="#070c1a" stroke="#45B7D1" stroke-width="1.5" class="node-pulse"/>
  <text x="760" y="218" class="m" font-size="9" fill="#45B7D1" text-anchor="middle" letter-spacing="1.2">1 · OPERATOR</text>
  <text x="760" y="232" class="s" font-size="10" fill="#dce8f5" text-anchor="middle">submit</text>
  <text x="850" y="155" class="m" font-size="8.5" fill="#45B7D1" letter-spacing="1" filter="url(#softbloom)">CLAUDE CODE · WEBSHELL · CLI</text>
  <text x="850" y="175" class="s" font-size="11" fill="#8a929d">A human describes the task in three ways:</text>
  <text x="850" y="192" class="s" font-size="11" fill="#8a929d">IDE for code, browser for ops, CLI for scripts.</text>
</g>

<!-- ── Station 2 (right): GATEWAY — auth + scope + injection shield ── -->
<g class="r2">
  <circle cx="830" cy="360" r="55" fill="url(#glow-corso)" filter="url(#bloom)"/>
  <circle cx="830" cy="360" r="32" fill="#070c1a" stroke="#00BFFF" stroke-width="1.5" class="node-pulse"/>
  <text x="830" y="358" class="m" font-size="9" fill="#00BFFF" text-anchor="middle" letter-spacing="1.2">2 · GATEWAY</text>
  <text x="830" y="372" class="s" font-size="10" fill="#dce8f5" text-anchor="middle">guard</text>
  <text x="900" y="335" class="m" font-size="8.5" fill="#00BFFF" letter-spacing="1" filter="url(#softbloom)">PLATFORM CORE</text>
  <text x="900" y="355" class="s" font-size="11" fill="#8a929d">Auth, scope governance, operator-wins guarantee,</text>
  <text x="900" y="372" class="s" font-size="11" fill="#8a929d">and indirect-injection shield before anything runs.</text>
</g>

<!-- ── Station 3 (bottom right): WAVE ENGINE — parallel workers ── -->
<g class="r3">
  <circle cx="760" cy="500" r="55" fill="url(#glow-amber)" filter="url(#bloom)"/>
  <circle cx="760" cy="500" r="32" fill="#070c1a" stroke="#F59E0B" stroke-width="1.5" class="node-pulse"/>
  <text x="760" y="498" class="m" font-size="9" fill="#F59E0B" text-anchor="middle" letter-spacing="1.2">3 · WAVE</text>
  <text x="760" y="512" class="s" font-size="10" fill="#dce8f5" text-anchor="middle">dispatch</text>
  <text x="850" y="555" class="m" font-size="8.5" fill="#F59E0B" letter-spacing="1" filter="url(#softbloom)">LIGHTSQUAD ORCHESTRATOR</text>
  <text x="850" y="575" class="s" font-size="11" fill="#8a929d">Up to 7 parallel workers with file-ownership</text>
  <text x="850" y="592" class="s" font-size="11" fill="#8a929d">partitioning. Three self-correction iterations.</text>
</g>

<!-- ── Station 4 (bottom left): KNOWLEDGE — SOUL retrieval ── -->
<g class="r4">
  <circle cx="440" cy="500" r="55" fill="url(#glow-soul)" filter="url(#bloom)"/>
  <circle cx="440" cy="500" r="32" fill="#070c1a" stroke="#34D399" stroke-width="1.5" class="node-pulse"/>
  <text x="440" y="498" class="m" font-size="9" fill="#34D399" text-anchor="middle" letter-spacing="1.2">4 · KNOWLEDGE</text>
  <text x="440" y="512" class="s" font-size="10" fill="#dce8f5" text-anchor="middle">retrieve</text>
  <text x="350" y="555" class="m" font-size="8.5" fill="#34D399" letter-spacing="1" filter="url(#softbloom)" text-anchor="end">SOUL · 96.2% RECALL@5</text>
  <text x="350" y="575" class="s" font-size="11" fill="#8a929d" text-anchor="end">Workers query the knowledge graph through</text>
  <text x="350" y="592" class="s" font-size="11" fill="#8a929d" text-anchor="end">4-signal RRF — agent identity travels with the task.</text>
</g>

<!-- ── Station 5 (left): MEMORY — EVA persistence ── -->
<g class="r5">
  <circle cx="370" cy="360" r="55" fill="url(#glow-eva)" filter="url(#bloom)"/>
  <circle cx="370" cy="360" r="32" fill="#070c1a" stroke="#FF1493" stroke-width="1.5" class="node-pulse"/>
  <text x="370" y="358" class="m" font-size="9" fill="#FF1493" text-anchor="middle" letter-spacing="1.2">5 · MEMORY</text>
  <text x="370" y="372" class="s" font-size="10" fill="#dce8f5" text-anchor="middle">persist</text>
  <text x="300" y="335" class="m" font-size="8.5" fill="#FF1493" letter-spacing="1" filter="url(#softbloom)" text-anchor="end">EVA · 15-STAGE HOOK PIPELINE</text>
  <text x="300" y="355" class="s" font-size="11" fill="#8a929d" text-anchor="end">Every interaction is intercepted, scored for</text>
  <text x="300" y="372" class="s" font-size="11" fill="#8a929d" text-anchor="end">anomalies, and committed with tamper-evident audit.</text>
</g>

<!-- ── Station 6 (top left): TRACE — AYIN observability ── -->
<g class="r6">
  <circle cx="440" cy="220" r="55" fill="url(#glow-ayin)" filter="url(#bloom)"/>
  <circle cx="440" cy="220" r="32" fill="#070c1a" stroke="#FF6D00" stroke-width="1.5" class="node-pulse"/>
  <text x="440" y="218" class="m" font-size="9" fill="#FF6D00" text-anchor="middle" letter-spacing="1.2">6 · TRACE</text>
  <text x="440" y="232" class="s" font-size="10" fill="#dce8f5" text-anchor="middle">observe</text>
  <text x="350" y="155" class="m" font-size="8.5" fill="#FF6D00" letter-spacing="1" filter="url(#softbloom)" text-anchor="end">AYIN · HTTP :3742</text>
  <text x="350" y="175" class="s" font-size="11" fill="#8a929d" text-anchor="end">Every tool call, LLM turn, build wave, and HTTP</text>
  <text x="350" y="192" class="s" font-size="11" fill="#8a929d" text-anchor="end">request — traced end-to-end, replayable.</text>
</g>

<!-- ── CENTER — 10-dimension merge gate medallion ── -->
<g class="r6">
  <!-- Background ring -->
  <circle cx="600" cy="360" r="68" fill="none" stroke="#172240" stroke-width="0.5"/>
  <circle cx="600" cy="360" r="52" fill="none" stroke="#172240" stroke-width="0.5"/>

  <!-- 10 dimension tick marks around the ring -->
  <g stroke="#dce8f5" stroke-width="1" stroke-linecap="round" filter="url(#softbloom)">
    <line x1="600" y1="296" x2="600" y2="308"/>
    <line x1="638" y1="304" x2="635" y2="316" transform="rotate(36 600 360)"/>
    <line x1="638" y1="304" x2="635" y2="316" transform="rotate(72 600 360)"/>
    <line x1="638" y1="304" x2="635" y2="316" transform="rotate(108 600 360)"/>
    <line x1="638" y1="304" x2="635" y2="316" transform="rotate(144 600 360)"/>
    <line x1="600" y1="412" x2="600" y2="424"/>
    <line x1="638" y1="304" x2="635" y2="316" transform="rotate(216 600 360)"/>
    <line x1="638" y1="304" x2="635" y2="316" transform="rotate(252 600 360)"/>
    <line x1="638" y1="304" x2="635" y2="316" transform="rotate(288 600 360)"/>
    <line x1="638" y1="304" x2="635" y2="316" transform="rotate(324 600 360)"/>
  </g>

  <!-- Dimension labels -->
  <g class="m" font-size="8" fill="#dce8f5" text-anchor="middle" filter="url(#softbloom)">
    <text x="600" y="286">A</text>
    <text x="638" y="295">S</text>
    <text x="664" y="324">Q</text>
    <text x="670" y="362">C</text>
    <text x="664" y="398">O</text>
    <text x="638" y="430">P</text>
    <text x="600" y="442">K</text>
    <text x="562" y="430">D</text>
    <text x="536" y="398">T</text>
    <text x="530" y="362">R</text>
    <text x="536" y="324">·</text>
    <text x="562" y="295">·</text>
  </g>

  <!-- Center text -->
  <text x="600" y="355" class="m" font-size="10" fill="#dce8f5" text-anchor="middle" letter-spacing="1.5">10-DIM</text>
  <text x="600" y="373" class="m" font-size="10" fill="#dce8f5" text-anchor="middle" letter-spacing="1.5">MERGE</text>
  <text x="600" y="391" class="m" font-size="10" fill="#dce8f5" text-anchor="middle" letter-spacing="1.5">GATE</text>
</g>

<!-- ── Footer ── -->
<g class="r6">
  <line x1="80" y1="635" x2="1120" y2="635" stroke="#172240" stroke-width="0.5"/>
  <text x="600" y="658" class="m" font-size="9" fill="#5a6473" text-anchor="middle" letter-spacing="2">The loop closes — outcome surfaces back to the operator with full lineage from any of the six stations.</text>
</g>

</svg>
